
<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Quotation Management{% endblock %}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    {% block extra_head %}{% endblock %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
   
</head>
<body>
    <header class="app-header bg-dark">
  

        <nav class="navbar navbar-expand-lg bg-body-tertiary navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fs-4 fw-bold" href="{% url 'home' %}">
      <span class="brand">Colourful Roofing Quotes</span>
    
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link active text-on-primary/80 hover:text-on-primary transition-colors font-label-sm text-label-sm hover:text-secondary-fixed-dim transition-all duration-200" aria-current="page" href="{% url 'home' %}">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{% url 'quote_list' %}">Quotes</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{% url 'create_quote' %}">Create Quote</a>
        </li>
          <li class="nav-item">
          <a class="nav-link" href="{% url 'create_customer' %}">Customer</a>
        </li>
           <li class="nav-item">
          <a class="nav-link" href="{% url 'create_product' %}">Product</a>
        </li>
       
      </ul>
    </div>
  </div>
</nav>
    </header>

    <main class="page-shell">
        {% block content %}{% endblock %}
    </main>
      <!-- Toast container -->
      <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 1080">
        <div id="toast-container"></div>
      </div>

      <script>
        // Theme toggle (light / dark) - simple, conflict-free version
        (function(){
          const doc = document.documentElement;
          const toggle = document.createElement('button');
          toggle.className = 'btn btn-sm btn-outline-secondary ms-2';
          toggle.type = 'button';
          toggle.setAttribute('aria-label', 'Toggle dark mode');
          
          const updateIcon = () => {
            const isDark = doc.getAttribute('data-bs-theme') === 'dark';
            toggle.innerHTML = isDark ? '<i class="bi bi-sun-fill"></i>' : '<i class="bi bi-moon-fill"></i>';
          };
          
          const setTheme = (isDark) => {
            doc.setAttribute('data-bs-theme', isDark ? 'dark' : 'light');
            localStorage.setItem('site-theme', isDark ? 'dark' : 'light');
            updateIcon();
          };

          // Initialize from storage or default
          const stored = localStorage.getItem('site-theme');
          if (stored) {
            doc.setAttribute('data-bs-theme', stored);
          }
          updateIcon();

          toggle.addEventListener('click', (e) => {
            e.preventDefault();
            const isDark = doc.getAttribute('data-bs-theme') === 'dark';
            setTheme(!isDark);
          });

          // Add to navbar
          const navbar = document.querySelector('.navbar .navbar-nav');
          if (navbar) {
            const li = document.createElement('li');
            li.className = 'nav-item ms-auto ms-md-0';
            li.appendChild(toggle);
            navbar.appendChild(li);
          }
        })();

        // Simple toast helper
        function showToast(message, opts) {
          opts = opts || {};
          const container = document.getElementById('toast-container');
          const toast = document.createElement('div');
          toast.className = 'toast align-items-center text-white bg-primary border-0';
          toast.role = 'alert';
          toast.ariaLive = 'assertive';
          toast.ariaAtomic = 'true';
          toast.innerHTML = `<div class="d-flex"><div class="toast-body">${message}</div><button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button></div>`;
          container.appendChild(toast);
          const bsToast = new bootstrap.Toast(toast, {delay: opts.delay||4000});
          bsToast.show();
          toast.addEventListener('hidden.bs.toast', () => toast.remove());
          return bsToast;
        }
      </script>
    <footer class="site-footer container">
      <div class="row align-items-center">
        <div class="col-md-6">
          <strong>© 2024 Colourful Roofing Quotes.</strong> All rights reserved.
        </div>
        <div class="col-md-6 text-md-end">
          <a href="#" class="text-decoration-none text-muted me-3">Privacy Policy</a>
          <a href="#" class="text-decoration-none text-muted me-3">Terms of Service</a>
          <a href="#" class="text-decoration-none text-muted">Support</a>
        </div>
      </div>
    </footer>
</body>
</html>
