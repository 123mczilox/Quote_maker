{% extends 'base.html' %}

{% block title %}Create Product{% endblock %}

{% block content %}
    <section class="page-heading">
        <div>
            <h1>Create Product</h1>
            <p>Add roofing products so they can be selected inside quotation item rows.</p>
        </div>
        <div class="actions">
            <a class="button secondary" href="{% url 'quote_list' %}">View Quotes</a>
            <a class="button" href="{% url 'create_quote' %}">Create Quote</a>
        </div>
    </section>

    <section class="panel">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="form-actions">
                <button type="submit">Save Product</button>
                <a class="button secondary" href="{% url 'home' %}">Cancel</a>
            </div>
        </form>
    </section>
{% endblock %}
