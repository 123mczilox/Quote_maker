{% extends 'base.html' %}

{% block title %}Create Customer{% endblock %}

{% block content %}
    <section class="page-heading">
        <div>
            <h1>Create Customer</h1>
            <p>Add customer details once, then reuse them when preparing quotations.</p>
        </div>
        <div class="actions">
            <a class="btn btn-outline-secondary" href="{% url 'quote_list' %}"><i class="bi bi-list-ul"></i> View Quotes</a>
            <a class="btn btn-primary" href="{% url 'create_quote' %}"><i class="bi bi-plus-circle"></i> Create Quote</a>
        </div>
    </section>

    <section class="panel">
            <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="form-actions">
                <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Save Customer</button>
                <a class="btn btn-outline-secondary" href="{% url 'home' %}">Cancel</a>
            </div>
        </form>
    </section>
{% endblock %}
